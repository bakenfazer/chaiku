name: Build, Push & Scan

on:
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Build & push the legacy stack images
  # ─────────────────────────────────────────────
  build-legacy:
    name: Build & Push (Legacy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push legacy images
        run: |
          docker compose -f docker-compose.yaml build frontend backend nginx
          docker tag chaiku-frontend ${{ secrets.REGISTRY_REPO }}:frontend
          docker tag chaiku-backend  ${{ secrets.REGISTRY_REPO }}:backend
          docker tag chaiku-nginx    ${{ secrets.REGISTRY_REPO }}:nginx
          docker push ${{ secrets.REGISTRY_REPO }}:frontend
          docker push ${{ secrets.REGISTRY_REPO }}:backend
          docker push ${{ secrets.REGISTRY_REPO }}:nginx
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

  # ─────────────────────────────────────────────
  # Job 2: Build & push the Chainguard stack images
  # ─────────────────────────────────────────────
  build-chainguard:
    name: Build & Push (Chainguard)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push Chainguard images
        run: |
          docker compose -f docker-compose-chainguard.yaml build frontend backend nginx
          docker tag chaiku-frontend-cg ${{ secrets.REGISTRY_REPO }}:frontend-cg
          docker tag chaiku-backend-cg  ${{ secrets.REGISTRY_REPO }}:backend-cg
          docker tag chaiku-nginx-cg    ${{ secrets.REGISTRY_REPO }}:nginx-cg
          docker push ${{ secrets.REGISTRY_REPO }}:frontend-cg
          docker push ${{ secrets.REGISTRY_REPO }}:backend-cg
          docker push ${{ secrets.REGISTRY_REPO }}:nginx-cg
        env:
          COMPOSE_DOCKER_CLI_BUILD: 1
          DOCKER_BUILDKIT: 1

  # ─────────────────────────────────────────────
  # Job 3: Grype CVE scan — Legacy images
  # ─────────────────────────────────────────────
  scan-legacy:
    name: Grype Scan (Legacy)
    runs-on: ubuntu-latest
    needs: build-legacy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Scan frontend (legacy)
        uses: anchore/scan-action@v4
        with:
          image: ${{ secrets.REGISTRY_REPO }}:frontend
          output-format: table
          fail-build: false

      - name: Scan backend (legacy)
        uses: anchore/scan-action@v4
        with:
          image: ${{ secrets.REGISTRY_REPO }}:backend
          output-format: table
          fail-build: false

      - name: Scan nginx (legacy)
        uses: anchore/scan-action@v4
        with:
          image: ${{ secrets.REGISTRY_REPO }}:nginx
          output-format: table
          fail-build: false

  # ─────────────────────────────────────────────
  # Job 4: Grype CVE scan — Chainguard images
  # ─────────────────────────────────────────────
  scan-chainguard:
    name: Grype Scan (Chainguard)
    runs-on: ubuntu-latest
    needs: build-chainguard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Scan frontend (Chainguard)
        uses: anchore/scan-action@v4
        with:
          image: ${{ secrets.REGISTRY_REPO }}:frontend-cg
          output-format: table
          fail-build: false

      - name: Scan backend (Chainguard)
        uses: anchore/scan-action@v4
        with:
          image: ${{ secrets.REGISTRY_REPO }}:backend-cg
          output-format: table
          fail-build: false

      - name: Scan nginx (Chainguard)
        uses: anchore/scan-action@v4
        with:
          image: ${{ secrets.REGISTRY_REPO }}:nginx-cg
          output-format: table
          fail-build: false